<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Time in Malaysia - Vibrant Neon Portfolio</title>

<style>
:root{
  --bg:#070a14;
  --grid:rgba(0,255,255,0.12);

  --cyan:#00f6ff;
  --green:#00ffb3;
  --pink:#ff4dff;
  --blue:#4da3ff;

  --text:#f1fbff;
  --muted:#c7e7ff;

  --card:rgba(255,255,255,0.08);
  --stroke:rgba(0,255,255,0.45);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,255,255,0.18), transparent 40%),
    radial-gradient(circle at 80% 60%, rgba(255,77,255,0.12), transparent 40%),
    radial-gradient(circle at 40% 90%, rgba(0,255,179,0.10), transparent 45%),
    var(--bg);
  color:var(--text);
}

/* GRID */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size:45px 45px;
  pointer-events:none;
}

/* HEADER */
header{
  text-align:center;
  padding:50px 20px 25px;
}

header h1{
  font-size:58px;
  font-weight:900;
  letter-spacing:2px;
  background:linear-gradient(90deg,var(--cyan),var(--pink),var(--green));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:
    0 0 25px rgba(0,255,255,0.6),
    0 0 45px rgba(255,77,255,0.3);
}

/* LAYOUT */
.container{
  width:95%;
  margin:auto;
  padding-bottom:60px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:25px;
}

@media(max-width:1000px){
  .grid{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:700px){
  .grid{grid-template-columns:1fr;}
  header h1{font-size:38px;}
}

/* CARD */
.card{
  background:linear-gradient(
    145deg,
    rgba(255,255,255,0.10),
    rgba(0,255,255,0.04)
  );
  border:1px solid var(--stroke);
  border-radius:18px;
  padding:18px;
  backdrop-filter:blur(14px);
  box-shadow:
    0 0 25px rgba(0,255,255,0.15),
    0 0 40px rgba(255,77,255,0.08);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:
    0 0 35px rgba(0,255,255,0.35),
    0 0 60px rgba(255,77,255,0.25);
  border-color:rgba(255,255,255,0.6);
}

/* LINKS */
.card a{
  display:block;
  text-align:center;
  font-size:20px;
  font-weight:800;
  margin-bottom:12px;
  color:var(--text);
  text-decoration:none;
  transition:0.2s;
}

.card a:hover{
  color:var(--cyan);
  text-shadow:0 0 15px var(--cyan);
}

/* IFRAME */
iframe{
  width:100%;
  height:100%;
  border:none;
}

.iframe-container{
  position:relative;
  width:100%;
  padding-top:75%;
  border-radius:12px;
  overflow:hidden;
  margin-bottom:15px;
  border:1px solid rgba(0,255,255,0.25);
}

/* HEADINGS */
.section-heading{
  font-size:13px;
  font-weight:900;
  color:var(--pink);
  margin:10px 0;
  letter-spacing:1px;
  text-transform:uppercase;
}

/* TEXT */
.card p{
  font-size:14px;
  line-height:1.6;
  color:var(--muted);
}

/* SCROLLBAR */
::-webkit-scrollbar{
  width:8px;
}

::-webkit-scrollbar-thumb{
  background:linear-gradient(var(--cyan),var(--pink),var(--green));
  border-radius:10px;
}
</style>
</head>

<body>

<header>
  <h1>My Time in Malaysia</h1>
</header>

<div class="container">
<div class="grid">

<!-- Your original cards stay EXACTLY the same structure -->
<div class="card">
  <a href="#">Absolute Value Function</a>
  <div class="iframe-container"><iframe src="about:blank"></iframe></div>
  <div class="section-heading">Transformations</div>
  <p>Your content stays unchanged.</p>
</div>

<div class="card">
  <a href="#">Secant Function</a>
  <div class="iframe-container"><iframe src="about:blank"></iframe></div>
  <div class="section-heading">Transformations</div>
  <p>Your content stays unchanged.</p>
</div>

<div class="card">
  <a href="#">Exponential Function</a>
  <div class="iframe-container"><iframe src="about:blank"></iframe></div>
  <div class="section-heading">Transformations</div>
  <p>Your content stays unchanged.</p>
</div>

<!-- (rest of your cards remain identical structure) -->

</div>
</div>

</body>
</html>
